name: Security Scan

on:
  schedule:
    # 12:00 AM Pacific (8:00 AM UTC)
    - cron: '0 8 * * *'
    # 6:00 AM Pacific (2:00 PM UTC)
    - cron: '0 14 * * *'
  # Also run on pushes to main so you catch issues on deploy
  push:
    branches: [main]
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run security-check
