name: Security Scan

on:
  schedule:
    # 12:00 AM Pacific (8:00 AM UTC)
    - cron: '0 8 * * *'
    # 6:00 AM Pacific (2:00 PM UTC)
    - cron: '0 14 * * *'
  # Also run on pushes to main so you catch issues on deploy
  push:
    branches: [main]
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install

      # Run the audit — continue even if it fails so the alert step can fire
      - name: Run security audit
        id: audit
        continue-on-error: true
        run: npm run security-check

      # Send red-flag email if audit found failures or warnings
      - name: Send alert email if threats detected
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SECURITY_ALERT_EMAIL: ${{ secrets.SECURITY_ALERT_EMAIL }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
        run: npm run security-alert

      # Fail the workflow if the audit failed (after email is sent)
      - name: Fail if audit detected issues
        if: steps.audit.outcome == 'failure'
        run: exit 1
