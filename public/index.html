    <title>Data Toyz | Trade Value Terminal</title>
    <!-- Nuke stale service workers & caches FIRST (inline so no external script needed) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
                regs.forEach(function(r) { r.unregister(); });
            });
            if ('caches' in window) {
                caches.keys().then(function(keys) {
                    keys.forEach(function(k) { caches.delete(k); });
                });
            }
        }
    </script>
    <!-- PWA disabled: apple-mobile-web-app-capable was breaking iPhone page loads -->
